<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supplier Quote Automation — MyDesk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f9fafb; padding: 24px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { margin-bottom: 20px; }
  .header h2 { font-size: 20px; color: #101828; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #eaecf0; }
  .card h3 { font-size: 14px; color: #101828; margin-bottom: 12px; }
  .upload { border: 2px dashed #d0d5dd; border-radius: 10px; padding: 24px; text-align: center; color: #667085; font-size: 13px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f2f4f7; }
  th { color: #667085; font-weight: 600; }
  .btn { padding: 8px 16px; background: #00a8b0; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h2>Supplier Quote Automation</h2></div>
  <div class="grid">
    <div class="card">
      <h3>Upload Quote</h3>
      <div class="upload">📄 Drop supplier quote PDF/image here</div>
      <button class="btn">Parse & Extract</button>
    </div>
    <div class="card">
      <h3>Extracted Quotes</h3>
      <table>
        <thead><tr><th>Supplier</th><th>Amount</th><th>Date</th></tr></thead>
        <tbody>
          <tr><td>Ace Components</td><td>$2,400.00</td><td>10 Jul</td></tr>
          <tr><td>Best Parts Co</td><td>$1,850.00</td><td>12 Jul</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
