name: Android APK Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'Mobile/Android/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'Mobile/Android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-read-only: false

      - name: Build debug APK
        working-directory: Mobile/Android/DigitalResponseMyDesk
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyDesk-debug-${{ github.run_number }}
          path: Mobile/Android/DigitalResponseMyDesk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
