<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agents — MyDesk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f9fafb; padding: 24px; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { margin-bottom: 20px; }
  .header h2 { font-size: 22px; color: #101828; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #eaecf0; }
  .card h3 { font-size: 14px; color: #101828; margin-bottom: 8px; }
  .card p { font-size: 12px; color: #667085; margin-bottom: 12px; }
  .metrics { display: flex; gap: 12px; margin-bottom: 12px; }
  .metric { background: #f9fafb; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
  .metric .v { font-weight: 700; color: #101828; }
  .btn { padding: 8px 14px; background: #00a8b0; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h2>AI Agents</h2></div>
  <div class="grid">
    <div class="card">
      <h3>🧠 Lead Researcher</h3>
      <p>Summarizes market research and competitor data.</p>
      <div class="metrics"><div class="metric">Runs: <div class="v">142</div></div><div class="metric">Avg: <div class="v">1.2s</div></div></div>
      <button class="btn">Run Agent</button>
    </div>
    <div class="card">
      <h3>📊 Quote Optimizer</h3>
      <p>Suggests pricing adjustments based on win rates.</p>
      <div class="metrics"><div class="metric">Runs: <div class="v">89</div></div><div class="metric">Avg: <div class="v">0.8s</div></div></div>
      <button class="btn">Run Agent</button>
    </div>
    <div class="card">
      <h3>📧 Email Assistant</h3>
      <p>Drafts follow-ups and renewal reminders.</p>
      <div class="metrics"><div class="metric">Runs: <div class="v">256</div></div><div class="metric">Avg: <div class="v">2.1s</div></div></div>
      <button class="btn">Run Agent</button>
    </div>
  </div>
</div>
</body>
</html>
