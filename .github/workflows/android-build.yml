name: Android APK Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'Mobile/Android/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'Mobile/Android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-read-only: false

      - name: Build debug APK
        working-directory: Mobile/Android/DigitalResponseMyDesk
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyDesk-debug-${{ github.run_number }}
          path: Mobile/Android/DigitalResponseMyDesk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Decode release keystore
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/mydesk-release.jks

      - name: Build release APK
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
        working-directory: Mobile/Android/DigitalResponseMyDesk
        env:
          KEYSTORE_PATH: /tmp/mydesk-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload release APK
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: MyDesk-release-${{ github.run_number }}
          path: Mobile/Android/DigitalResponseMyDesk/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
