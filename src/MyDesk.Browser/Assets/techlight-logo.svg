<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tealGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(40,40)" filter="url(#tealGlow)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00c8c8" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#00e0e0" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00cccc" stroke-width="2" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00c8c8" stroke-width="2" opacity="1"/>
  </g>

  <text
    x="92"
    y="52"
    font-family="Inter, 'Segoe UI', system-ui, sans-serif"
    font-weight="700"
    font-size="32"
    letter-spacing="-0.5"
    fill="#ffffff"
  >Techlight</text>
</svg>
