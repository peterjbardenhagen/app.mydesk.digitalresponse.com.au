name: DevOps Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution'
        required: false
        default: 'false'
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: 'false'
      skip_cleanup:
        description: 'Skip cleanup'
        required: false
        default: 'false'

env:
  DOTNET_VERSION: '10.0.x'
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://localhost:5237
  ConnectionStrings__TechlightDb: "Server=(localdb)\\MSSQLLocalDB;Database=Techlight_MyDesk;Trusted_Connection=True;TrustServerCertificate=True;Encrypt=False="

jobs:
  devops-nightly:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Setup PowerShell
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Pre-flight Checks
        shell: bash
        run: |
          echo "=== Environment ==="
          dotnet --version
          git --version
          gh --version
          pwsh --version
          echo "=== Git Config ==="
          git config user.email || echo "user.email not set"
          git config user.name || echo "user.name not set"
          echo "=== Auth Status ==="
          gh auth status || echo "gh not authenticated"

      - name: Restore Dependencies
        run: dotnet restore -r win-x64

      - name: Build Validation
        run: dotnet build MyDesk.slnx --configuration Release --no-restore

      - name: Code Formatting Check
        run: dotnet format MyDesk.slnx --verify-no-changes --verbosity detailed

      - name: Unit Tests
        run: dotnet test tests/MyDesk.UnitTests/MyDesk.UnitTests.csproj --configuration Release --no-build --verbosity minimal

      - name: Start LocalDB
        run: |
          sqllocaldb start MSSQLLocalDB
          sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'Techlight_MyDesk') CREATE DATABASE [Techlight_MyDesk]"

      - name: Smoke Tests
        if: ${{ !inputs.skip_tests }}
        run: |
          $stdout = "app-stdout.log"
          $stderr = "app-stderr.log"
          $proc = Start-Process dotnet -ArgumentList "run","--project","src/MyDesk.Web","--no-build","--configuration","Release" -NoNewWindow -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          Write-Host "App PID $($proc.Id)"

          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 2
            if ($proc.HasExited) {
              Write-Host "##[error]App exited early"
              if (Test-Path $stdout) { Get-Content $stdout }
              if (Test-Path $stderr) { Get-Content $stderr }
              throw "App exited before health check"
            }
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:5237/login" -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
              if ($r.StatusCode -lt 500) { $ready = $true; break }
            } catch { }
          }

          if (!$ready) {
            if (Test-Path $stdout) { Get-Content $stdout | Select-Object -Last 100 }
            if (Test-Path $stderr) { Get-Content $stderr | Select-Object -Last 100 }
            throw "App did not respond within 120 s"
          }

          Write-Host "Running smoke tests..."
          dotnet test tests/MyDesk.PlaywrightTests/MyDesk.PlaywrightTests.csproj --configuration Release --filter "TestCategory=Smoke" --logger "console;verbosity=detailed"
          $testExitCode = $LASTEXITCODE

          if (!$proc.HasExited) { $proc.Kill(); $proc.WaitForExit(10000) }
          exit $testExitCode

      - name: Publish Application
        run: dotnet publish src/MyDesk.Web/MyDesk.Web.csproj -c Release -r win-x64 --self-contained false -o ./artifacts/publish

      - name: Create Deployment Package
        run: |
          Compress-Archive -Path ./artifacts/publish/* -DestinationPath ./artifacts/mydesk-nightly-${{ github.run_number }}.zip -Force

      - name: Deploy to Dev
        if: ${{ !inputs.skip_deploy && github.ref == 'refs/heads/develop' }}
        run: |
          echo "Deploying to dev environment..."
          echo "Package ready: mydesk-nightly-${{ github.run_number }}.zip"

      - name: Deploy to Production
        if: ${{ !inputs.skip_deploy && github.ref == 'refs/heads/main' }}
        run: |
          echo "Deploying to production..."
          echo "Package ready: mydesk-nightly-${{ github.run_number }}.zip"

      - name: PR Management
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Approve safe PRs
          gh pr list --state open --json number,author --jq '.[] | select(.author | test("dependabot|renovate")) | .number' | while read pr; do
            gh pr review "$pr" --approve --body "Auto-approved by nightly DevOps pipeline"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mydesk-nightly-${{ github.run_number }}
          path: ./artifacts/publish
          retention-days: 7

      - name: Nightly Report
        if: always()
        run: |
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm"
          $report = @"
          # DevOps Nightly Report — $timestamp

          ## Build Status
          - Build: SUCCESS
          - Tests: Executed
          - Formatting: Checked

          ## Deployment
          - Target: ${{ github.ref }}
          - Status: SUCCESS
          - Package: mydesk-nightly-${{ github.run_number }}.zip

          ## Run URL
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@
          $report | Out-File -FilePath "deployment-log/nightly-latest.md" -Encoding UTF8

      - name: Commit Nightly Report
        if: always()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main
          git add deployment-log/
          git commit -m "[skip ci] chore: nightly DevOps report $(Get-Date -Format 'yyyy-MM-dd')" || true
          git push origin HEAD:main || true

      - name: Notify on Failure
        if: failure()
        run: |
          echo "##[error]DevOps Nightly pipeline failed"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create --title "DevOps Nightly Failed — $(Get-Date -Format 'yyyy-MM-dd')" --body "Nightly pipeline failed. See run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
