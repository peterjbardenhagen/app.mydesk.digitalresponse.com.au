<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8c8"/>
      <stop offset="100%" stop-color="#004E89"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f7fa"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7B801"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#004E89" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer ring decoration -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Orbital dots -->
  <circle cx="200" cy="25" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="200" cy="375" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="25" cy="200" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="375" cy="200" r="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Head shape -->
  <ellipse cx="200" cy="185" rx="85" ry="95" fill="url(#faceGrad)"/>

  <!-- Ear-like circuit nodes -->
  <circle cx="115" cy="180" r="12" fill="rgba(0,200,200,0.2)" stroke="#00c8c8" stroke-width="1.5"/>
  <circle cx="285" cy="180" r="12" fill="rgba(0,200,200,0.2)" stroke="#00c8c8" stroke-width="1.5"/>

  <!-- Glowing core (third eye / AI node) -->
  <circle cx="200" cy="130" r="10" fill="url(#accentGrad)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="200" cy="130" r="5" fill="white" opacity="0.8"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="170" cy="175" rx="18" ry="14" fill="white" stroke="#004E89" stroke-width="2"/>
  <circle cx="170" cy="176" r="7" fill="#004E89"/>
  <circle cx="172" cy="173" r="2.5" fill="rgba(255,255,255,0.8)"/>

  <!-- Right eye -->
  <ellipse cx="230" cy="175" rx="18" ry="14" fill="white" stroke="#004E89" stroke-width="2"/>
  <circle cx="230" cy="176" r="7" fill="#004E89"/>
  <circle cx="232" cy="173" r="2.5" fill="rgba(255,255,255,0.8)"/>

  <!-- Eyebrows (friendly arch) -->
  <path d="M155 163 Q170 152 185 161" fill="none" stroke="#004E89" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M215 161 Q230 152 245 163" fill="none" stroke="#004E89" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Friendly smile -->
  <path d="M175 210 Q200 235 225 210" fill="none" stroke="#004E89" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="148" cy="205" rx="12" ry="7" fill="rgba(255,107,53,0.15)"/>
  <ellipse cx="252" cy="205" rx="12" ry="7" fill="rgba(255,107,53,0.15)"/>

  <!-- Data particles floating -->
  <circle cx="120" cy="235" r="2" fill="rgba(0,200,200,0.4)"/>
  <circle cx="130" cy="245" r="1.5" fill="rgba(0,200,200,0.3)"/>
  <circle cx="280" cy="235" r="2" fill="rgba(0,200,200,0.4)"/>
  <circle cx="270" cy="245" r="1.5" fill="rgba(0,200,200,0.3)"/>

  <!-- Body / shoulders (simplified) -->
  <path d="M150 275 Q200 300 250 275 L270 350 Q200 370 130 350 Z" fill="rgba(255,255,255,0.15)"/>

  <!-- Circuit lines on body -->
  <path d="M160 300 L180 300 L180 310" fill="none" stroke="rgba(0,200,200,0.2)" stroke-width="1.5"/>
  <path d="M240 300 L220 300 L220 310" fill="none" stroke="rgba(0,200,200,0.2)" stroke-width="1.5"/>

  <!-- MyDesk 'D' mark on chest -->
  <circle cx="200" cy="320" r="18" fill="rgba(255,255,255,0.25)"/>
  <path d="M193 312 L207 312 Q215 312 215 320 Q215 328 207 328 L193 328 Z" fill="white" opacity="0.6"/>

  <!-- Year label -->
  <text x="200" y="382" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="4">DESKY 2026</text>
</svg>
