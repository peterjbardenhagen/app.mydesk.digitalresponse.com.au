<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgentsOS — MyDesk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f9fafb; padding: 24px; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h2 { font-size: 22px; color: #101828; }
  .status { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #e8f7ee; color: #12b76a; }
  .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #eaecf0; margin-bottom: 16px; }
  .card h3 { font-size: 16px; color: #101828; margin-bottom: 12px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input { flex: 2; padding: 10px; border: 1px solid #d0d5dd; border-radius: 8px; }
  .input-row textarea { flex: 3; padding: 10px; border: 1px solid #d0d5dd; border-radius: 8px; min-height: 60px; }
  .btn { padding: 10px 20px; background: #00a8b0; color: #fff; border: none; border-radius: 8px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f2f4f7; }
  th { color: #667085; font-weight: 600; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .running { background: #e0f2fe; color: #0369a1; }
  .done { background: #e8f7ee; color: #12b76a; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h2>AgentsOS</h2><p style="color:#667085;font-size:13px;">Orchestrate AI agents across your workspace</p></div>
    <div class="status">✅ AgentsOS reachable</div>
  </div>
  <div class="card">
    <h3>Submit New Brief</h3>
    <div class="input-row">
      <input placeholder="Project title">
      <textarea placeholder="Brief description"></textarea>
    </div>
    <button class="btn">🚀 Submit</button>
  </div>
  <div class="card">
    <h3>Projects</h3>
    <table>
      <thead><tr><th>Id</th><th>Title</th><th>Status</th><th>Updated</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>Q3 Campaign Launch</td><td><span class="badge running">Running</span></td><td>2 min ago</td></tr>
        <tr><td>2</td><td>Customer Follow-ups</td><td><span class="badge done">Done</span></td><td>1 hour ago</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
