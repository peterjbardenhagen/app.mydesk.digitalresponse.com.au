name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full test suite (slow — 20+ min)'
        type: boolean
        default: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://localhost:5237
      ConnectionStrings__TechlightDb: "Server=(localdb)\\MSSQLLocalDB;Database=Techlight_MyDesk;Trusted_Connection=True;TrustServerCertificate=True;Encrypt=False;"

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Solution
      run: dotnet build MyDesk.slnx --configuration Release

    - name: Install Playwright Browsers
      run: pwsh tests/MyDesk.PlaywrightTests/bin/Release/net10.0/playwright.ps1 install chromium

    - name: Start LocalDB and create CI database
      run: |
        sqllocaldb start MSSQLLocalDB
        sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'Techlight_MyDesk') CREATE DATABASE [Techlight_MyDesk]"

    - name: Start App and Run Tests
      run: |
        $stdout = "app-stdout.log"
        $stderr = "app-stderr.log"
        $proc = Start-Process dotnet `
          -ArgumentList "run","--project","src/MyDesk.Web","--no-build","--configuration","Release" `
          -NoNewWindow -PassThru `
          -RedirectStandardOutput $stdout `
          -RedirectStandardError  $stderr
        Write-Host "App started with PID $($proc.Id)"

        # Poll up to 120 s for the app to respond
        $ready = $false
        for ($i = 0; $i -lt 60; $i++) {
          Start-Sleep -Seconds 2
          if ($proc.HasExited) {
            Write-Host "##[error]App process exited early (exit code $($proc.ExitCode))"
            if (Test-Path $stdout) { Get-Content $stdout | ForEach-Object { Write-Host $_ } }
            if (Test-Path $stderr) { Get-Content $stderr | ForEach-Object { Write-Host $_ } }
            throw "App process exited before health check passed"
          }
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:5237/login" -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
            if ($r.StatusCode -lt 500) { $ready = $true; break }
          } catch { }
        }

        if (!$ready) {
          if (Test-Path $stdout) { Get-Content $stdout | Select-Object -Last 100 | ForEach-Object { Write-Host $_ } }
          if (Test-Path $stderr) { Get-Content $stderr | Select-Object -Last 100 | ForEach-Object { Write-Host $_ } }
          throw "App did not respond on http://localhost:5237/login within 120 s"
        }

        Write-Host "App is ready."

        # Smoke only on push/PR; full suite only on manual workflow_dispatch with full_suite=true
        $fullSuite = '${{ inputs.full_suite }}' -eq 'true'
        $filterArg = if ($fullSuite) { @() } else { @("--filter", "TestCategory=Smoke") }
        $suiteLabel = if ($fullSuite) { "FULL suite" } else { "SMOKE tests only" }
        Write-Host "Running $suiteLabel..."

        dotnet test tests/MyDesk.PlaywrightTests/MyDesk.PlaywrightTests.csproj `
          --configuration Release `
          --logger "console;verbosity=detailed" `
          --logger "trx;LogFileName=TestResults.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults `
          --no-build `
          @filterArg
        $testExitCode = $LASTEXITCODE

        if (!$proc.HasExited) {
          $proc.Kill()
          $proc.WaitForExit(10000)
        }

        exit $testExitCode

    - name: Print App Logs
      if: always()
      run: |
        if (Test-Path "app-stdout.log") { Get-Content "app-stdout.log" | ForEach-Object { Write-Host $_ } }
        if (Test-Path "app-stderr.log") { Get-Content "app-stderr.log" | ForEach-Object { Write-Host $_ } }

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: |
          TestResults/
          tests/MyDesk.PlaywrightTests/screenshots/
          app-stdout.log
          app-stderr.log
        retention-days: 30

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Report
        path: 'TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
