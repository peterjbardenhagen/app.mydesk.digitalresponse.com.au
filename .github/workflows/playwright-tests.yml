name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Solution
      run: dotnet build MyDesk.slnx --configuration Release

    - name: Install Playwright Browsers
      run: pwsh tests/MyDesk.PlaywrightTests/bin/Release/net10.0/playwright.ps1 install chromium

    - name: Run Playwright Tests
      run: |
        dotnet test tests/MyDesk.PlaywrightTests/MyDesk.PlaywrightTests.csproj `
          --logger "console;verbosity=detailed" `
          --logger "trx;LogFileName=TestResults.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: |
          TestResults/
          tests/MyDesk.PlaywrightTests/screenshots/
          tests/MyDesk.PlaywrightTests/videos/
        retention-days: 30
    
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Report
        path: 'TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
    
    - name: Generate Coverage Report
      if: always()
      run: |
        $coverage = Get-ChildItem -Recurse -Filter coverage.cobertura.xml -Path TestResults | Select-Object -First 1
        if ($coverage) {
          Write-Host "Coverage report: $($coverage.FullName)"
        } else {
          Write-Host "No coverage report found (tests may not have run)"
        }
