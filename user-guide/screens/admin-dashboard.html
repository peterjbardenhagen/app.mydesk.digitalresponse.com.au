<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard — MyDesk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f9fafb; padding: 24px; }
  .top { margin-bottom: 20px; }
  .top h2 { font-size: 20px; color: #101828; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #eaecf0; }
  .card h3 { font-size: 14px; color: #101828; margin-bottom: 12px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f2f4f7; font-size: 13px; color: #344054; }
  .row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="top">
  <h2>Admin Dashboard</h2>
</div>
<div class="grid">
  <div class="card">
    <h3>System Health</h3>
    <div class="row"><span>Server Status</span><span style="color:#12b76a;">● Online</span></div>
    <div class="row"><span>Database</span><span style="color:#12b76a;">● Healthy</span></div>
    <div class="row"><span>Storage</span><span>42% used</span></div>
    <div class="row"><span>Last Backup</span><span>2 hours ago</span></div>
  </div>
  <div class="card">
    <h3>Users</h3>
    <div class="row"><span>Total Users</span><span>142</span></div>
    <div class="row"><span>Active Today</span><span>89</span></div>
    <div class="row"><span>Pending Invites</span><span>5</span></div>
    <div class="row"><span>Locked Accounts</span><span>0</span></div>
  </div>
  <div class="card">
    <h3>Platform</h3>
    <div class="row"><span>Tenants</span><span>3</span></div>
    <div class="row"><span>API Calls Today</span><span>24.5K</span></div>
    <div class="row"><span>Error Rate</span><span>0.02%</span></div>
    <div class="row"><span>Uptime</span><span>99.98%</span></div>
  </div>
</div>
</body>
</html>
