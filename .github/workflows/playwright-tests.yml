name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install Playwright Browsers
      run: |
        dotnet tool install --global Microsoft.Playwright.CLI
        playwright install chromium
    
    - name: Build Solution
      run: dotnet build Techlight.MyDesk.slnx --configuration Release
    
    - name: Run Playwright Tests
      run: |
        dotnet test tests/MyDesk.PlaywrightTests/MyDesk.PlaywrightTests.csproj `
          --logger "console;verbosity=detailed" `
          --logger "trx;LogFileName=TestResults.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: |
          TestResults/
          tests/MyDesk.PlaywrightTests/screenshots/
          tests/MyDesk.PlaywrightTests/videos/
        retention-days: 30
    
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Report
        path: 'TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
    
    - name: Generate Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      if: always()
      with:
        filename: TestResults/**/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '60 80'
