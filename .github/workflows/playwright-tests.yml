name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Solution
      run: dotnet build MyDesk.slnx --configuration Release

    - name: Install Playwright Browsers
      run: pwsh tests/MyDesk.PlaywrightTests/bin/Release/net10.0/playwright.ps1 install chromium

    - name: Start LocalDB and create CI database
      run: |
        sqllocaldb start MSSQLLocalDB
        sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'Techlight_MyDesk') CREATE DATABASE [Techlight_MyDesk]"

    - name: Start Application
      run: |
        $env:ASPNETCORE_ENVIRONMENT = "Development"
        $env:ASPNETCORE_URLS = "http://localhost:5237"
        $env:ConnectionStrings__TechlightDb = "Server=(localdb)\MSSQLLocalDB;Database=Techlight_MyDesk;Trusted_Connection=True;TrustServerCertificate=True;Encrypt=False;"
        $proc = Start-Process dotnet -ArgumentList "run","--project","src/MyDesk.Web","--no-build","--configuration","Release","--urls","http://localhost:5237" -NoNewWindow -PassThru
        Write-Host "App started with PID $($proc.Id)"
        # Poll until ready (up to 90 seconds)
        $ready = $false
        for ($i = 0; $i -lt 45; $i++) {
          Start-Sleep -Seconds 2
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:5237/login" -UseBasicParsing -TimeoutSec 3 -ErrorAction Stop
            if ($r.StatusCode -lt 500) { $ready = $true; break }
          } catch { }
        }
        if ($ready) { Write-Host "App is ready" } else { Write-Host "##[warning]App did not respond within 90s — tests may fail" }

    - name: Run Playwright Tests
      run: |
        dotnet test tests/MyDesk.PlaywrightTests/MyDesk.PlaywrightTests.csproj `
          --configuration Release `
          --logger "console;verbosity=detailed" `
          --logger "trx;LogFileName=TestResults.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults `
          --no-build
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-test-results
        path: |
          TestResults/
          tests/MyDesk.PlaywrightTests/screenshots/
          tests/MyDesk.PlaywrightTests/videos/
        retention-days: 30
    
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Playwright Test Report
        path: 'TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
    
    - name: Generate Coverage Report
      if: always()
      run: |
        $coverage = Get-ChildItem -Recurse -Filter coverage.cobertura.xml -Path TestResults | Select-Object -First 1
        if ($coverage) {
          Write-Host "Coverage report: $($coverage.FullName)"
        } else {
          Write-Host "No coverage report found (tests may not have run)"
        }
